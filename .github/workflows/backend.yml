name: backend

on:
  push:
    branches: ["main"]

jobs:
  deploy_team:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # 팀원별 배포 환경
        # 필요 시 아래 배열에 환경명을 다시 추가하면 각자 VM으로 동시 배포 가능
        # env: [15mintableback-sjw, cicd-backend-hjhong, 15mintable-back-chan]
        env: [15mintableback-sjw]

    environment: ${{ matrix.env }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: install JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: create_properties_test_build_push
        shell: bash
        run: |
          set -euo pipefail

          echo "${{ secrets.APPLICATION_PROPERTIES }}" | base64 --decode > ./src/main/resources/application.properties
          chmod +x ./mvnw

          # 배포 전 백엔드 자동화 테스트
          # Spring Context 테스트, Service 단위 테스트, Controller 응답 테스트 실행
          # 테스트가 실패하면 Docker build / push / VM 배포 단계는 실행되지 않음
          ./mvnw test

          ./mvnw clean package -DskipTests

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            docker-compose -f ~/backend-compose.yml pull
            docker ps -a --format '{{.Names}}' | grep -E '(^backend$|_backend$)' | xargs -r docker rm -f
            docker-compose -f ~/backend-compose.yml up -d